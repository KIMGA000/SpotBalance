# Vite 리액트 앱을 빌드하여 GitHub Pages에 정밀 배포하는 워크플로우
name: Deploy SpotBalance to Pages

on:
  push:
    branches: ["main"] # main 브랜치에 코드가 올라올 때마다 작동
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 🌟 [치트키 과정 1] 라이브러리 자동 설치
      - name: Install dependencies
        run: npm ci

      # 🌟 [치트키 과정 2] 순수 브라우저가 읽을 수 있는 진짜 완제품(dist 폴더) 구워내기
      - name: Build React App
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 🌟 [치트키 과정 3] 압축 완료된 dist 폴더만 쏙 골라내서 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

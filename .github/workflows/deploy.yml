name: Deploy SpotBalance to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 1. 완제품을 요리하기 위해 필요한 리액트 라이브러리들 원격 자동 설치
      - name: Install Dependencies
        run: npm ci

      # 2. [가장 중요] 리액트 생 원본을 브라우저가 읽을 수 있는 진짜 자바스크립트 완제품(dist 폴더)으로 구워내기
      - name: Build React App
        run: npm run build

      - name: Setup GitHub Pages Config
        uses: actions/configure-pages@v5

      # 3. 껍데기 폴더 말고 오직 완제품이 담긴 'dist' 폴더 내부만 골라내서 업로드하기
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages Live
        id: deployment
        uses: actions/deploy-pages@v5
